---
systemd_service_name:

systemd_service_content:
systemd_service_file:
systemd_service_template:
systemd_service_use_template_default: true
systemd_service_template_default: |
        [Unit]
        Description={{ systemd_service_name }} service generated by Ansible
        After=network.target

        [Service]
        Type=simple
        User=root
        ExecStart=/usr/local/sbin/{{ systemd_service_name }}
        Restart=on-failure
        RestartSec=10

        [Install]
        WantedBy=multi-user.target

systemd_service_files: []
systemd_service_auto_create_dirs: false
systemd_service_templates: []
systemd_service_dirs: []

systemd_service_docker_compose_content:
systemd_service_docker_compose_templates: []
systemd_service_docker_compose_files: []

systemd_service_docker_base_dir: /opt
systemd_service_docker_volume_base_dir: "{{ systemd_service_docker_base_dir }}/{{ systemd_service_name }}/volumes"
systemd_service_docker_service_template_default: |
  [Unit]
  Description={{ systemd_service_name }} in docker container
  After=network.target
  [Service]
  ExecStart=/usr/bin/docker compose -f /opt/{{ systemd_service_name }}/docker-compose.yml up
  ExecStop=/usr/bin/docker compose -f /opt/{{ systemd_service_name }}/docker-compose.yml down
  Restart=on-failure
  [Install]
  WantedBy=default.target

systemd_service_packages: []
